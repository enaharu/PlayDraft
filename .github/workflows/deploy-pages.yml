name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_PEER_HOST: ${{ vars.NEXT_PUBLIC_PEER_HOST }}
          NEXT_PUBLIC_PEER_PORT: ${{ vars.NEXT_PUBLIC_PEER_PORT }}
          NEXT_PUBLIC_PEER_PATH: ${{ vars.NEXT_PUBLIC_PEER_PATH }}
          NEXT_PUBLIC_PEER_SECURE: ${{ vars.NEXT_PUBLIC_PEER_SECURE }}
          NEXT_PUBLIC_SIGNALING_HEALTH_URL: ${{ vars.NEXT_PUBLIC_SIGNALING_HEALTH_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
      - id: deployment
        uses: actions/deploy-pages@v4
